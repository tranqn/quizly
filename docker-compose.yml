# Quizly Docker stack — one file, two modes via a Compose profile.
#
#   LOCAL  : docker compose up --build            -> http://localhost:8000
#            (app + PO-token sidecar; no TLS; set DEBUG=True in backend/.env)
#   PROD   : docker compose --profile prod up -d --build
#            (adds the Caddy auto-HTTPS proxy; set DEBUG=False, DOMAIN, ... in .env)
services:
  # Proof-of-Origin token provider for yt-dlp (YouTube anti-bot).
  potoken:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: backend/.env
    environment:
      - FRONTEND_DIR=/frontend
      - SQLITE_PATH=/app/data/db.sqlite3
      - YTDLP_POT_BASE_URL=http://potoken:4416
    volumes:
      - sqlite-data:/app/data          # persists the SQLite database
      - whisper-cache:/home/app/.cache # persists downloaded Whisper models
      - ./secrets:/secrets             # cookies.txt; rw so yt-dlp can refresh it
    depends_on:
      - potoken
    restart: unless-stopped
    # Bound to localhost: locally this is the app's address (http://localhost:8000);
    # in prod Caddy reaches it over the internal network, so 127.0.0.1 keeps port
    # 8000 off the VM's public interface.
    ports:
      - "127.0.0.1:8000:8000"

  # Production only (enabled by `--profile prod`): TLS termination + reverse proxy.
  caddy:
    image: caddy:2
    profiles: ["prod"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-quizly.example.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

volumes:
  sqlite-data:
  whisper-cache:
  caddy-data:
  caddy-config:
